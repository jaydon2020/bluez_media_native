# Run with `dart run ffigen --config ffigen.yaml`.
name: BluezMediaNativeBindings
description: |
  Bindings for `src/bluez_media_native.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/bluez_media_native_bindings_generated.dart'
headers:
  entry-points:
    - 'src/bluez_media_native.h'
  include-directives:
    - 'src/bluez_media_native.h'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
